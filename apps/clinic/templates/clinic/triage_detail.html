{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-8 p-4">
    <a href="{% url 'triage_list' %}" class="text-blue-900 hover:underline flex items-center mb-6">
        <i data-lucide="arrow-left" class="mr-2 w-4 h-4"></i> Back to Queue
    </a>

    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <div class="bg-blue-900 p-6 text-white flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-bold">{{ encounter.patient.full_name }}</h2>
                <p class="opacity-80">{{ encounter.patient.reg_number }} | {{ encounter.patient.gender }}</p>
            </div>
            <div class="text-right">
                <span class="bg-blue-800 px-3 py-1 rounded-full text-xs font-mono uppercase">Ticket: {{ encounter.visit_id|stringformat:".8s" }}</span>
            </div>
        </div>

        <form method="POST" class="p-8">
            {% csrf_token %}
            <h3 class="text-lg font-semibold text-gray-700 mb-6 flex items-center">
                <i data-lucide="activity" class="mr-2 text-red-500"></i> Vital Signs Recording
            </h3>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Body Temp (°C)</label>
                    <div class="relative">
                        <input type="number" step="0.1" name="temp" required
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                               placeholder="36.5">
                        <span class="absolute right-3 top-3 text-gray-400">°C</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Blood Pressure</label>
                    <input type="text" name="bp" required
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                           placeholder="120/80">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Weight (kg)</label>
                    <div class="relative">
                        <input type="number" step="0.1" name="weight" required
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none"
                               placeholder="70.0">
                        <span class="absolute right-3 top-3 text-gray-400">kg</span>
                    </div>
                </div>
            </div>

            <div class="mt-8 pt-8 border-t border-gray-100">
                <button type="submit" 
                        class="w-full md:w-auto bg-green-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-700 transition-all transform hover:scale-105 shadow-lg flex items-center justify-center">
                    <i data-lucide="check-circle" class="mr-2"></i> Complete Triage & Send to Doctor
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
